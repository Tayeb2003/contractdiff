<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94e8b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c880;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a2e28"/>
  <!-- Scale/balance icon -->
  <g fill="none" stroke="url(#mintGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top beam -->
    <path d="M6 10h20"/>
    <!-- Center post -->
    <path d="M16 10v6"/>
    <!-- Left pan -->
    <path d="M8 10v2c0 2.5 2 4.5 5 4.5s5-2 5-4.5v-2"/>
    <!-- Right pan -->
    <path d="M24 10v2c0 2.5-2 4.5-5 4.5s-5-2-5-4.5v-2"/>

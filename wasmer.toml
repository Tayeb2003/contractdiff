[package]
name = "tayeb2003/contractdiff"
version = "0.1.0"
description = "ContractDiff — AI-powered contract comparison tool"
private = false

[dependencies]
"wasmer/winterjs" = "*"

[fs]
"/app" = "./edge"

[[command]]
name = "backend"
module = "wasmer/winterjs:wasmer-winter"
runner = "https://webc.org/runner/wasi"
[command.annotations.wasi]
main-args = ["/app/bundle.js"]
